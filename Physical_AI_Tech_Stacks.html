// Pre-compute overlap counts
const overlapCount = {};
companies.forEach(c => { overlapCount[c.n] = c.stacks.length; });

const stackNames = [
  {id:1, short:"Defense: Terrestrial/Aerial", cls:"sh-1"},
  {id:2, short:"Defense: Orbital/Space", cls:"sh-2"},
  {id:3, short:"Commercial: Self-Driving", cls:"sh-3"},
  {id:4, short:"Commercial: Industrial AMR", cls:"sh-4"},
  {id:5, short:"Commercial: Consumer Robots", cls:"sh-5"},
  {id:6, short:"Commercial: Space Datacenters", cls:"sh-6"},
];

const layerDefs = [
  {id:"app", title:"Application Layer", cls:"l-app"},
  {id:"ai", title:"AI/ML Platform", cls:"l-ai"},
  {id:"dc", title:"AI Datacenter", cls:"l-dc", hasSub:true},
  {id:"hw", title:"Compute Hardware", cls:"l-hw"},
  {id:"phys", title:"Physical Platform", cls:"l-phys", hasOemSup:true},
];

let activeFilter = 'all';

function ovClass(n) {
  const c = overlapCount[n] || 1;
  if (c >= 6) return 'ov-6';
  if (c >= 5) return 'ov-5';
  if (c >= 4) return 'ov-4';
  if (c >= 3) return 'ov-3';
  if (c >= 2) return 'ov-2';
  return 'ov-1';
}

function makeChip(company) {
  const el = document.createElement('span');
  el.className = 'chip ' + ovClass(company.n);
  el.textContent = company.t === 'Private' || company.t === 'OSS' ? company.n : company.n;
  el.title = company.t;
  el.dataset.name = company.n;
  
  // Apply filter
  if (activeFilter === 'multi' && company.stacks.length < 2) el.classList.add('dim');
  if (activeFilter === '3plus' && company.stacks.length < 3) el.classList.add('dim');
  if (activeFilter === '5plus' && company.stacks.length < 5) el.classList.add('dim');
  
  el.addEventListener('click', () => showDetail(company));
  el.addEventListener('mouseenter', () => {
    document.querySelectorAll('.chip').forEach(ch => {
      if (ch.dataset.name === company.n) ch.classList.add('glow');
    });
  });
  el.addEventListener('mouseleave', () => {
    document.querySelectorAll('.chip').forEach(ch => ch.classList.remove('glow'));
  });
  return el;
}

function render() {
  const wrap = document.getElementById('stacks');
  wrap.innerHTML = '';
  
  stackNames.forEach(stack => {
    const col = document.createElement('div');
    col.className = 'stack-col';
    
    // Header
    const header = document.createElement('div');
    header.className = 'stack-header ' + stack.cls;
    header.textContent = stack.short;
    col.appendChild(header);
    
    layerDefs.forEach(layer => {
      const layerEl = document.createElement('div');
      let dcMinor = (layer.id === 'dc' && stack.id === 5);
      layerEl.className = 'layer ' + layer.cls + (dcMinor ? ' minor' : '');
      
      const title = document.createElement('div');
      title.className = 'layer-title';
      title.textContent = layer.title + (dcMinor ? ' (minor)' : '');
      layerEl.appendChild(title);
      
      if (layer.id === 'dc' && layer.hasSub) {
        // Main DC companies
        const mainChips = document.createElement('div');
        mainChips.className = 'chips';
        companies.filter(c => c.layer === 'dc' && c.stacks.includes(stack.id))
          .forEach(c => mainChips.appendChild(makeChip(c)));
        layerEl.appendChild(mainChips);
        
        // Power sub-layer
        const pwrSub = document.createElement('div');
        pwrSub.className = 'sublayer';
        const pwrTitle = document.createElement('div');
        pwrTitle.className = 'sublayer-title';
        pwrTitle.textContent = 'Power';
        pwrSub.appendChild(pwrTitle);
        const pwrChips = document.createElement('div');
        pwrChips.className = 'chips';
        companies.filter(c => c.layer === 'dc-power' && c.stacks.includes(stack.id))
          .forEach(c => pwrChips.appendChild(makeChip(c)));
        pwrSub.appendChild(pwrChips);
        if (pwrChips.children.length > 0) layerEl.appendChild(pwrSub);
        
        // CPO sub-layer
        const cpoSub = document.createElement('div');
        cpoSub.className = 'sublayer';
        const cpoTitle = document.createElement('div');
        cpoTitle.className = 'sublayer-title';
        cpoTitle.textContent = 'Co-Packaged Optics';
        cpoSub.appendChild(cpoTitle);
        const cpoChips = document.createElement('div');
        cpoChips.className = 'chips';
        companies.filter(c => c.layer === 'dc-cpo' && c.stacks.includes(stack.id))
          .forEach(c => cpoChips.appendChild(makeChip(c)));
        cpoSub.appendChild(cpoChips);
        if (cpoChips.children.length > 0) layerEl.appendChild(cpoSub);
        
      } else if (layer.id === 'phys' && layer.hasOemSup) {
        // OEM section
        const oemLabel = document.createElement('div');
        oemLabel.className = 'oem-label';
        oemLabel.textContent = 'OEMs';
        layerEl.appendChild(oemLabel);
        const oemChips = document.createElement('div');
        oemChips.className = 'chips';
        companies.filter(c => c.layer === 'phys-oem' && c.stacks.includes(stack.id))
          .forEach(c => oemChips.appendChild(makeChip(c)));
        layerEl.appendChild(oemChips);
        
        // Supplier section
        const supLabel = document.createElement('div');
        supLabel.className = 'sup-label';
        supLabel.textContent = 'Suppliers';
        layerEl.appendChild(supLabel);
        const supChips = document.createElement('div');
        supChips.className = 'chips';
        companies.filter(c => c.layer === 'phys-sup' && c.stacks.includes(stack.id))
          .forEach(c => supChips.appendChild(makeChip(c)));
        layerEl.appendChild(supChips);
        
      } else if (layer.id !== 'dc') {
        const chips = document.createElement('div');
        chips.className = 'chips';
        companies.filter(c => c.layer === layer.id && c.stacks.includes(stack.id))
          .forEach(c => chips.appendChild(makeChip(c)));
        layerEl.appendChild(chips);
      }
      
      col.appendChild(layerEl);
    });
    
    wrap.appendChild(col);
  });
}

function showDetail(c) {
  document.getElementById('dn').textContent = c.n;
  document.getElementById('dtk').textContent = c.t;
  const pr = document.getElementById('dpr');
  pr.innerHTML = '<strong style="font-size:.65rem;color:#888">Present in:</strong> ' + 
    c.stacks.map(s => {
      const sn = stackNames.find(x=>x.id===s);
      return `<span class="p${s}">${sn.short}</span>`;
    }).join('');
  document.getElementById('drl').textContent = c.role;
  document.getElementById('det').classList.add('show');
  document.getElementById('ov').classList.add('show');
}

function closeD(){
  document.getElementById('det').classList.remove('show');
  document.getElementById('ov').classList.remove('show');
}
document.getElementById('xb').onclick = closeD;
document.getElementById('ov').onclick = closeD;

// Filters
const filterDefs = [
  {f:'all', l:'All Companies'},
  {f:'multi', l:'2+ Stacks (Overlap)'},
  {f:'3plus', l:'3+ Stacks'},
  {f:'5plus', l:'5-6 Stacks (Titans)'},
];
const fWrap = document.getElementById('filters');
filterDefs.forEach(({f,l}) => {
  const btn = document.createElement('button');
  btn.className = 'fbtn' + (f === 'all' ? ' active' : '');
  btn.textContent = l;
  btn.onclick = () => {
    fWrap.querySelectorAll('.fbtn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    activeFilter = f;
    render();
  };
  fWrap.appendChild(btn);
});

render();
</script>
</body>
</html>
